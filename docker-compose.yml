services:
  db:
    image: postgres:15-alpine
    container_name: alocacoes_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=alocacoes
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - TZ=America/Belem
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d alocacoes"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: alocacoes_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/alocacoes
      - ENV=development
      - HOST=0.0.0.0
      - PORT=8000
      - JWT_SECRET=change_me_super_secret
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - OAUTHLIB_INSECURE_TRANSPORT=1
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pg_data: